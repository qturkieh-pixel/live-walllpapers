<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LIVEWALLPAPERS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>LIVEWALLPAPERS</h1>
    <label class="upload-btn">
        Upload MP3 / MP4
        <input type="file" id="fileInput" multiple accept=".mp3,.mp4">
    </label>
</header>

<div class="container">

    <section>
        <h2>🎵 Music</h2>
        <div id="musicList" class="grid"></div>
    </section>

    <section>
        <h2>🎬 Videos</h2>
        <div id="videoList" class="grid"></div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
